[Model]
ModelName = net_ubctc.Ubctc

# -----------------------------------------------------------------------
# Coda-weighted CTC Loss（针对 1/2、3/4、7/8 末尾辅音漏字的优化）
#
# 启用方式：训练前导出环境变量
#   export CODA_MASK_PATH=/path/to/coda_senone_mask.pt
#   export CODA_BOOST=1.1           # log(3) ≈ 1.1，推荐起步值
#
# 工作原理：在 CTC 计算前对 coda senones 的 log-prob 加正向偏置，
#           等价于贝叶斯先验偏向 coda 输出。re-normalize 后保持合法 log-prob
#
# 推荐 boost 值（log 空间）：
#   0.7  ≈ 倍率 2.0  (保守)
#   1.1  ≈ 倍率 3.0  (推荐起步)
#   1.6  ≈ 倍率 5.0  (激进，可能伤主任务)
#
# 生成 mask：python scripts/find_coda_senones.py <hmmlist.final> coda_senone_mask.pt
# -----------------------------------------------------------------------

[TrainSetting]
TrainType = ASR
initEncoderModel = /yrfs4/asrdictt/tyliu23/am_data_process/kr/2_train/kr_car_tts_0416/model.iterBEST.partBEST
OutDir = kr_car_tts_0507
Iter = 12
Half = 4
InitLearningRate = 0.00015
LearningRate = 0.00015
Display = 100
Optimizer = SGD
LookAhead = True
LookAhead_K = 6
LookAhead_Alpha = 0.5
CVInterval = 0
NGpu = 4
RandomSeed = 0
ClipGradient = 2
ClipGradient2 = 20
Discount = 0.5
BMUF_ALPHA = 0.75
BMUF_BLR = 1.0
BMUF_BM = 1.0
BMUF_SYNC = 20
JIT = False

# -----------------------------------------------------------------------
# 数据混合策略说明（2026-05-07 更新）
#
# 背景：韩语车载"打电话给XXX"/"打电话1234567"丢字+1(일)/2(이)混淆
#       1/2 仅末尾 ㄹ 不同，混响下尾音先丢，TTS 合成边界比真人清晰，拉大 train/test gap
#
# 本轮变更（vs 0416 版本）：
#   1. 真人车载数据从 ~80 条扩到 10.5h×2.8=29.4h（clean 离线增强）+ 4h（RIR），从信号注入升为主力
#   2. 拆出仅含 일/이 的 hard-case 子集，单独加权
#   3. TTS Contact + Num 合并为单一 section（Rate 0.05+0.05→0.1，整体曝光不变；号码内部占比 2/3 自然加权）
#   4. fine-tune LR 从 0.0003 降至 0.00015，Iter 从 20 缩到 12，避免冲掉通用 500h
#
# 数据量：
#   主集 800h（通用 400h + 车载 400h，离线仿真增强） | TTS合并(Contact 39h + Num 78h)≈117h
#   真人车载 legacy ~80条(0416遗留) | 真人车载 clean 29.4h(10.5h×2.8 离线增强)
#   真人车载 RIR 4h | 真人 1/2 hard-case 子集（待抽取）
#
# 解码侧并行：decode_ubctc.py 已加 --bias-tokens/--bias-value，
#             号码场景给 [일이삼사오육칠팔구공] 加 +0.4~+0.7 偏置，无需重训即可 A/B
# -----------------------------------------------------------------------

[TrainDataSetting]
Bunchsize    = 16384
PadNum       = 4
MaxNumSent   = 1000
MaxSentFrame = 8192
ShuffleBatch = True
ShuffleSeq   = True
NormFile     = /yrfs4/asrdictt/tyliu23/am_data_process/kr/1_down_pfile/lib_fb40/fea.norm

# DataSetting（主集 800h，含车载仿真）必须放第一位，Rate=1.0 作锚点
#   train_cfg.py:572 硬编码 mix_rates[0]=1.0，其余 Rate 是相对于它的权重
#   旧版本曾把 DataSetting 放最后，会导致 train_iternum 在 lines 606/615 被覆盖两次
# 其余 Rate 是相对值（>1.0 也合法，无上限），按"真人 > TTS > 主集"原则加权
# CarReal12Hard 暂未制作（hard-case 子集），整段已注释；就绪后加回 Rate=1.2
TrainDatas = DataSetting, DataSettingTTS, DataSettingCarRealLegacy, \
             DataSettingCarRealClean, DataSettingCarRealRIR
Rates      = 1.0,         0.4,            0.2, \
             2.4,                     0.4

# CarReal12Hard 暂未制作，待 hard-case 子集抽取完成后加回，建议 Rate=1.2

ReverbFile = /work1/asrdictt/ssyan2/work_dir/multi_input_prjs/0_data_process/reverb_npy/reverb_pak_real_135m.npy
NoisePaths = /yrfs4/asrdictt/ssyan2/jingpinfangyan/sichuan/noise/dev.list.reverb_music_noise/lmdb_datas/lmdb0, /yrfs4/asrdictt/ssyan2/jingpinfangyan/sichuan/noise/dev.list.reverb_tv_noise/lmdb_datas/lmdb0

BatchCtrl = False

# -----------------------------------------------------------------------
# 主数据：通用 400h + 车载 400h ≈ 800h（离线已仿真增强，fb40 pfile格式）
#         车载部分已含主流车舱条件，不再单独维护 DataSettingCar
# -----------------------------------------------------------------------
[DataSetting]
InitSent = 120000
CVSentNum = 1000
DataType = pfile
Npart = 4
DataDir     = /yrfs4/asrdictt/tyliu23/am_data_process/kr/1_down_pfile/lib_fb40
DataDirLab  = /yrfs4/asrdictt/tyliu23/am_data_process/kr/1_down_pfile/lib_fb40
FeaturePrefix = fea.pfile.$
LabelPrefix   = lab.pfile.$

[PartDistribution]
Iteration7 = 0,1,2,3,4
Iteration8 = 5,6,7,8,9
Iteration9 = 0,1,2,3,4
Iteration10 = 5,6,7,8,9
Iteration11 = 0,1,2,3,4
Iteration12 = 5,6,7,8,9
Iteration13 = 0,1,2,3,4
Iteration14 = 5,6,7,8,9

# -----------------------------------------------------------------------
# 附加数据2：TTS 联系人 + 电话号码合并（离线增强后约 117h，fb40 pfile格式）
#           Contact 部分（39h）：联系人姓名场景
#           Num 部分（78h）：韩语数字逐字读 일이삼사오육칠팔구공
#           合并后内部分布 Num:Contact ≈ 2:1，自然采样
# -----------------------------------------------------------------------
[DataSettingTTS]
InitSent = 0
CVSentNum = 200
DataType = pfile
Npart = 4
DataDir     = PLACEHOLDER_TTS_PFILE_DIR
DataDirLab  = PLACEHOLDER_TTS_PFILE_DIR
FeaturePrefix = fea.pfile.$
LabelPrefix   = lab.pfile.$

[PartDistribution_DataSettingTTS]

# -----------------------------------------------------------------------
# 附加数据4z：真人车载 legacy（0416 轮的 ~80 条，与新 10.5h 解耦保留）
#             数据量极小，CVSentNum=0 跳过验证，Rate=0.05 限制曝光防过拟合
# -----------------------------------------------------------------------
[DataSettingCarRealLegacy]
InitSent = 0
CVSentNum = 0
DataType = pfile
Npart = 4
DataDir     = PLACEHOLDER_CAR_REAL_LEGACY_PFILE_DIR
DataDirLab  = PLACEHOLDER_CAR_REAL_LEGACY_PFILE_DIR
FeaturePrefix = fea.pfile.$
