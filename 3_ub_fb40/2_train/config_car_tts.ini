[PartDistribution_DataSettingCarRealLegacy]

# -----------------------------------------------------------------------
# 附加数据4a：真人车载电话号码 clean 29.4h（10.5h 原始 × 2.8 离线增强；不做 RIR/在线加噪）
#             CVSentNum=50：pfile 200 句 val 区间紧贴 MaxNumSent=200，留余量防 pad 空报错
