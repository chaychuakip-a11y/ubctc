[Model]
ModelName = net_ubctc.Ubctc

[TrainSetting]
TrainType = ASR
initEncoderModel = /yrfs4/asrdictt/tyliu23/am_data_process/kr/2_train/train_ctc_init_ce/model.iter13.part4
OutDir = kr_car_tts_0507
Iter = 12
Half = 4
InitLearningRate = 0.00015
LearningRate = 0.00015
Display = 100
Optimizer = SGD
LookAhead = True
LookAhead_K = 6
LookAhead_Alpha = 0.5
CVInterval = 0
NGpu = 4
RandomSeed = 0
ClipGradient = 2
ClipGradient2 = 20
Discount = 0.5
BMUF_ALPHA = 0.75
BMUF_BLR = 1.0
BMUF_BM = 1.0
BMUF_SYNC = 20
JIT = False

# -----------------------------------------------------------------------
# 数据混合策略说明（2026-05-07 更新）
#
# 背景：韩语车载"打电话给XXX"/"打电话1234567"丢字+1(일)/2(이)混淆
#       1/2 仅末尾 ㄹ 不同，混响下尾音先丢，TTS 合成边界比真人清晰，拉大 train/test gap
#
# 本轮变更（vs 0416 版本）：
#   1. 真人车载数据从 ~80 条扩到 10.5h（clean）+ 10.5h（RIR），从信号注入升为主力
#   2. 拆出仅含 일/이 的 hard-case 子集，单独加权
#   3. TTS 号码权重下调（合成偏差明显，再大反伤 1/2 区分）
#   4. fine-tune LR 从 0.0003 降至 0.00015，Iter 从 20 缩到 12，避免冲掉通用 500h
#
# 数据量：
#   通用 500h | 车载安静 8h | TTS联系人 39h(增强后) | TTS号码 78h(增强后)
#   真人车载 clean 10.5h | 真人车载 RIR 10.5h | 真人 1/2 hard-case 子集（待抽取）
#
# 解码侧并行：decode_ubctc.py 已加 --bias-tokens/--bias-value，
#             号码场景给 [일이삼사오육칠팔구공] 加 +0.4~+0.7 偏置，无需重训即可 A/B
# -----------------------------------------------------------------------

[TrainDataSetting]
Bunchsize    = 16384
PadNum       = 4
MaxNumSent   = 1000
MaxSentFrame = 8192
ShuffleBatch = True
ShuffleSeq   = True
NormFile     = /yrfs4/asrdictt/tyliu23/am_data_process/kr/1_down_pfile/lib_fb40/fea.norm

# DataSetting（通用500h）放最后，train_iternum 由它决定
# CarReal12Hard 是 Clean 的子集，CVSentNum=0 跳过验证以避免 batch_num<=0 边界问题
# Rates 设计原则：真人 > TTS（分布对齐 > 合成数据量），1/2 子集再加权
TrainDatas = DataSettingCar, DataSettingTTSContact, DataSettingTTSNum, \
             DataSettingCarRealClean, DataSettingCarRealRIR, DataSettingCarReal12Hard, \
             DataSetting
Rates      = 0.5,            0.05,                  0.05, \
             0.6,                     0.6,                   0.3, \
             0.25

ReverbFile = /work1/asrdictt/ssyan2/work_dir/multi_input_prjs/0_data_process/reverb_npy/reverb_pak_real_135m.npy
NoisePaths = /yrfs4/asrdictt/ssyan2/jingpinfangyan/sichuan/noise/dev.list.reverb_music_noise/lmdb_datas/lmdb0, /yrfs4/asrdictt/ssyan2/jingpinfangyan/sichuan/noise/dev.list.reverb_tv_noise/lmdb_datas/lmdb0

BatchCtrl = False

# -----------------------------------------------------------------------
# 主数据：通用韩语500h（离线已增强，fb40 pfile格式）
# -----------------------------------------------------------------------
[DataSetting]
InitSent = 120000
CVSentNum = 1000
DataType = pfile
Npart = 4
DataDir     = /yrfs4/asrdictt/tyliu23/am_data_process/kr/1_down_pfile/lib_fb40
DataDirLab  = /yrfs4/asrdictt/tyliu23/am_data_process/kr/1_down_pfile/lib_fb40
FeaturePrefix = fea.pfile.$
LabelPrefix   = lab.pfile.$

[PartDistribution]
Iteration7 = 0,1,2,3,4
Iteration8 = 5,6,7,8,9
Iteration9 = 0,1,2,3,4
Iteration10 = 5,6,7,8,9
Iteration11 = 0,1,2,3,4
Iteration12 = 5,6,7,8,9
Iteration13 = 0,1,2,3,4
Iteration14 = 5,6,7,8,9

# -----------------------------------------------------------------------
# 附加数据1：车载安静录音8h（建议离线加RIR后再制pfile，当前为原始版本）
