[Model]
ModelName = net_ubctc.Ubctc

[TrainSetting]
TrainType = ASR
initEncoderModel = /yrfs4/asrdictt/tyliu23/am_data_process/kr/2_train/train_ctc_init_ce/model.iter13.part4
OutDir = kr_car_tts_0416
Iter = 20
Half = 6
InitLearningRate = 0.0003
LearningRate = 0.0003
Display = 100
Optimizer = SGD
LookAhead = True
LookAhead_K = 6
LookAhead_Alpha = 0.5
CVInterval = 0
NGpu = 4
RandomSeed = 0
ClipGradient = 2
ClipGradient2 = 20
Discount = 0.5
BMUF_ALPHA = 0.75
BMUF_BLR = 1.0
BMUF_BM = 1.0
BMUF_SYNC = 20
JIT = False

# -----------------------------------------------------------------------
# 数据混合策略说明（2026-04-16）
#
# 背景：韩语车载场景"打电话给XXX"/"打电话1234567"存在丢字问题
#       微软TTS合成测试句准70%+，实车回放测试句准很低
#
# 根因分析：
#   1. 原训练离线增强pipeline无RIR步骤，回放场景必然引入车舱混响，训练未覆盖
#   2. config中Aug配置对fb40 pfile完全无效（代码仅对FeatureType=wav或lmdb生效）
#   3. 原fine-tune只训4轮，LR偏低(0.0001)，模型未充分收敛
#   4. train_iternum取TrainDatas最后一个数据集，大数据集需放最后
#
# 数据量：
#   通用韩语500h | 车载安静8h | TTS联系人14h(增强后39h) | TTS号码28h(增强后78h)
#
# 混合比例(以DataSetting为基准1.0)：
#   车载4.0 : TTS联系人0.4 : TTS号码0.3 : 通用1.0
#   等效：通用78% / 车载14% / TTS联系人2% / TTS号码4%
#
# 注意：TTS数据必须在制pfile前完成离线增强（已完成，2.8倍），
#       不要在此处写Aug=，对fb40 pfile无效。
#
# 后续优化建议：
#   - 离线pipeline加入RIR卷积步骤（使用reverb_pak_real_135m.npy）
#   - TTS数据加RIR比例建议60~70%，车载数据30~40%
#   - 离线加噪SNR范围从单档5dB扩展至0,5,10,15,20dB
#   - 变速从单一1.2x扩展至0.9x,1.0x,1.1x,1.2x（对韩语数字语速变化有效）
# -----------------------------------------------------------------------

[TrainDataSetting]
Bunchsize    = 16384
PadNum       = 4
MaxNumSent   = 1000
MaxSentFrame = 8192
ShuffleBatch = True
ShuffleSeq   = True
NormFile     = /yrfs4/asrdictt/tyliu23/am_data_process/kr/1_down_pfile/lib_fb40/fea.norm

# DataSetting放最后，train_iternum由最大数据集（通用500h）决定，保证每轮充分覆盖
TrainDatas = DataSettingCar, DataSettingTTSContact, DataSettingTTSNum, DataSetting
Rates      = 4.0,            0.4,                   0.3,               1.0

ReverbFile = /work1/asrdictt/ssyan2/work_dir/multi_input_prjs/0_data_process/reverb_npy/reverb_pak_real_135m.npy
NoisePaths = /yrfs4/asrdictt/ssyan2/jingpinfangyan/sichuan/noise/dev.list.reverb_music_noise/lmdb_datas/lmdb0, /yrfs4/asrdictt/ssyan2/jingpinfangyan/sichuan/noise/dev.list.reverb_tv_noise/lmdb_datas/lmdb0

BatchCtrl = False

# -----------------------------------------------------------------------
# 主数据：通用韩语500h（离线已增强，fb40 pfile格式）
# -----------------------------------------------------------------------
[DataSetting]
InitSent = 120000
CVSentNum = 1000
DataType = pfile
Npart = 4
DataDir     = /yrfs4/asrdictt/tyliu23/am_data_process/kr/1_down_pfile/lib_fb40
DataDirLab  = /yrfs4/asrdictt/tyliu23/am_data_process/kr/1_down_pfile/lib_fb40
FeaturePrefix = fea.pfile.$
LabelPrefix   = lab.pfile.$

[PartDistribution]
Iteration7 = 0,1,2,3,4
Iteration8 = 5,6,7,8,9
Iteration9 = 0,1,2,3,4
Iteration10 = 5,6,7,8,9
Iteration11 = 0,1,2,3,4
Iteration12 = 5,6,7,8,9
Iteration13 = 0,1,2,3,4
Iteration14 = 5,6,7,8,9

# -----------------------------------------------------------------------
# 附加数据1：车载安静录音8h（建议离线加RIR后再制pfile，当前为原始版本）
