#             pfile 实际 764 句，<MaxNumSent，CVSentNum=0 跳过验证防 pad 空报错
# -----------------------------------------------------------------------
[DataSettingCarRealRIR]
InitSent = 0
CVSentNum = 0
DataType = pfile
Npart = 4
DataDir     = PLACEHOLDER_CAR_REAL_RIR_PFILE_DIR
DataDirLab  = PLACEHOLDER_CAR_REAL_RIR_PFILE_DIR
FeaturePrefix = fea.pfile.$
LabelPrefix   = lab.pfile.$

[PartDistribution_DataSettingCarRealRIR]

